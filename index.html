<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortGuard - Gestão de Rondas</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #0a192f; --secondary: #112240; --accent: #ffd600;
            --bg: #0d1117; --text: #e6edf3; --white: #ffffff;
            --danger: #f85149; --success: #238636; --border: #30363d;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .header { background: var(--primary); color: var(--white); padding: 12px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 12px; max-width: 600px; margin: auto; }
        .card { background: var(--secondary); border-radius: 4px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; font-size: 1rem; color: var(--white); }
        .btn { border: none; padding: 12px; border-radius: 4px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .btn-save { background: var(--success); color: white; }
        .btn-pdf { background: #1f6feb; color: white; font-size: 0.7rem; padding: 5px 10px; width: auto; }
        .btn-report { background: var(--accent); color: #0a192f; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); display: flex; border-top: 1px solid var(--accent); padding: 8px 0; z-index: 100; }
        .nav-item { cursor: pointer; text-align: center; font-size: 0.65rem; flex: 1; color: #8b949e; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--accent); }
        .hidden { display: none !important; }
        .viatura-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .check-item { background: #161b22; padding: 10px; border-radius: 4px; text-align: center; cursor: pointer; border: 1px solid var(--border); font-size: 0.65rem; }
        .check-item.ok { border-color: #238636; color: #39d353; background: rgba(35, 134, 54, 0.1); }
        .check-item.pendencia { border-color: #f85149; color: #ff7b72; background: rgba(248, 81, 73, 0.1); }
        #preview-foto { width: 100%; border-radius: 4px; margin-top: 10px; display: none; border: 1px solid var(--border); }
        .ronda-entry { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0d1117; margin-bottom: 8px; border-radius: 4px; }
        #qrcode-hidden { position: absolute; left: -9999px; top: 0; }
    </style>
</head>
<body>

<div id="qrcode-hidden"></div>

<div class="header">
    <h1>FORTGUARD OPS</h1>
    <div style="width: 10px; height: 10px; background: #2ea043; border-radius: 50%;"></div>
</div>

<div id="view-perfil" class="container">
    <div class="card">
        <h3>👤 PERFIL DO SUPERVISOR</h3>
        <label>Nome:</label> <input type="text" id="p-nome">
        <label>VTR (Placa):</label> <input type="text" id="p-placa">
        <label>Empresa:</label> <input type="text" id="p-empresa">
        <button class="btn btn-save" onclick="salvarPerfil()">SALVAR CONFIGURAÇÕES</button>
    </div>
</div>

<div id="view-rondas" class="container hidden">
    <div class="card">
        <h3>📋 NOVO REGISTRO</h3>
        <div class="viatura-inputs">
            <div><label>VTR:</label><input type="text" id="r-placa" readonly></div>
            <div><label>KM Atual:</label><input type="number" id="r-km"></div>
        </div>
        <label>Posto:</label> <select id="r-posto"></select>
        <label>Missão:</label> 
        <select id="r-motivo">
            <option value="Fiscalização">Fiscalização</option>
            <option value="Ronda Noturna">Ronda Noturna</option>
            <option value="Deslocamento">Deslocamento</option>
        </select>
        <div class="checklist-grid">
            <div class="check-item" onclick="toggleCheck(this)">APRESENTAÇÃO</div>
            <div class="check-item" onclick="toggleCheck(this)">UNIFORME</div>
            <div class="check-item" onclick="toggleCheck(this)">POSTURA</div>
            <div class="check-item" onclick="toggleCheck(this)">LIVRO OCOR.</div>
        </div>
        <label>Foto da Ocorrência:</label>
        <input type="file" id="r-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
        <img id="preview-foto">
        <button class="btn btn-save" onclick="salvarRonda()">FINALIZAR REGISTRO</button>
    </div>

    <div class="card">
        <h3>📊 HISTÓRICO DE HOJE</h3>
        <div id="historico-rondas"></div>
        <button class="btn btn-report" onclick="gerarRelatorioGeral()" style="margin-top:20px">GERAR FECHAMENTO (PDF)</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showView('perfil')">PERFIL</div>
    <div class="nav-item" onclick="showView('rondas')">RONDAS</div>
</nav>

<script>
    const postos = ["10º TABELIONATO", "COLÉGIO DOM FELICIANO", "COLÉGIO STELLA MARIS", "COND ALPHAVILLE POA", "ZAFFARI - IPANEMA", "ZAFFARI - CAVALHADA"];
    let db = JSON.parse(localStorage.getItem('fg_db')) || { perfil: {}, rondas: [] };
    let fotoBase64 = "";

    function showView(v) {
        document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
        document.getElementById('view-' + v).classList.remove('hidden');
        if(v === 'rondas') {
            document.getElementById('r-placa').value = db.perfil.placa || "";
            renderRondas();
        }
    }

    function toggleCheck(e) {
        e.classList.toggle('ok');
    }

    function previewImage(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            fotoBase64 = e.target.result;
            const img = document.getElementById('preview-foto');
            img.src = fotoBase64;
            img.style.display = "block";
        };
        reader.readAsDataURL(input.files[0]);
    }

    function salvarPerfil() {
        db.perfil = { nome: document.getElementById('p-nome').value, placa: document.getElementById('p-placa').value, empresa: document.getElementById('p-empresa').value };
        localStorage.setItem('fg_db', JSON.stringify(db));
        alert("Perfil atualizado!");
    }

    function salvarRonda() {
        if(!fotoBase64 || !document.getElementById('r-km').value) return alert("Preencha KM e tire a Foto!");
        
        const nova = {
            id: Date.now(),
            posto: document.getElementById('r-posto').value,
            data: new Date().toLocaleDateString(),
            hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            km: document.getElementById('r-km').value,
            foto: fotoBase64,
            checklist: Array.from(document.querySelectorAll('.check-item.ok')).map(i => i.innerText)
        };

        db.rondas.push(nova);
        localStorage.setItem('fg_db', JSON.stringify(db));
        
        // Limpar campos
        fotoBase64 = "";
        document.getElementById('preview-foto').style.display = "none";
        document.getElementById('r-km').value = "";
        
        alert("Registro Salvo com Sucesso!");
        renderRondas();
    }

    function renderRondas() {
        const lista = document.getElementById('historico-rondas');
        lista.innerHTML = db.rondas.slice().reverse().map((r, index) => `
            <div class="ronda-entry">
                <div><strong>${r.hora}</strong> - ${r.posto}</div>
                <button class="btn btn-pdf" onclick="gerarCardDigital(${db.rondas.length - 1 - index})">GERAR CARD</button>
            </div>
        `).join('');
    }

    async function gerarCardDigital(idx) {
        const r = db.rondas[idx];
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "mm", format: [100, 150] });

        // Design do Card
        doc.setFillColor(10, 25, 47); doc.rect(0, 0, 100, 150, 'F');
        doc.setFillColor(255, 214, 0); doc.rect(0, 0, 100, 15, 'F');
        doc.setFont("helvetica", "bold"); doc.setFontSize(12); doc.setTextColor(10, 25, 47);
        doc.text("COMPROVANTE OPERACIONAL", 50, 10, { align: "center" });

        // Inserir Foto
        if(r.foto) {
            try {
                doc.addImage(r.foto, 'JPEG', 10, 20, 80, 60);
            } catch(e) { console.error("Erro na imagem"); }
        }

        doc.setTextColor(255, 214, 0); doc.setFontSize(14);
        doc.text(r.posto.toUpperCase(), 50, 90, { align: "center" });

        doc.setTextColor(255, 255, 255); doc.setFontSize(10);
        doc.text(`Data: ${r.data} - ${r.hora}`, 10, 100);
        doc.text(`KM: ${r.km} | VTR: ${db.perfil.placa}`, 10, 107);
        doc.text(`Supervisor: ${db.perfil.nome}`, 10, 114);

        // Gerar QR Code
        const qrDiv = document.getElementById("qrcode-hidden");
        qrDiv.innerHTML = "";
        new QRCode(qrDiv, { text: `VALIDO: ${r.id}`, width: 100, height: 100 });
        
        await new Promise(res => setTimeout(res, 400));
        const canvas = qrDiv.querySelector("canvas");
        if(canvas) {
            doc.addImage(canvas.toDataURL("image/png"), 'PNG', 70, 120, 20, 20);
        }

        doc.save(`Card_${r.posto}.pdf`);
    }

    window.onload = () => {
        const sel = document.getElementById('r-posto');
        postos.forEach(p => sel.add(new Option(p, p)));
        showView('perfil');
    };
</script>
</body>
</html>
