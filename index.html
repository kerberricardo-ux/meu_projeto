<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINELA OPS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #0a192f;
            --accent: #ffd600;
            --danger: #f85149;
            --success: #238636;
            --bg: #0f1c2e;
            --card: #16233a;
            --text: #e0e7ff;
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            padding-bottom: 85px;
            line-height: 1.4;
        }

        .header { 
            background: var(--primary); 
            color: white; 
            padding: 14px 16px; 
            border-bottom: 4px solid var(--accent); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .header h1 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1.5px; }

        .container { padding: 12px; max-width: 640px; margin: 0 auto; }

        .card {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .card h3 {
            margin: 0 0 16px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent);
            color: var(--accent);
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            margin: 12px 0 5px 0;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #1e2a44;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-primary { background: var(--accent); color: #0a192f; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: #2563eb; color: white; }
        .btn-small { padding: 8px 12px; font-size: 0.8rem; width: auto; margin: 0; }

        .menu-item {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-icon { font-size: 1.8rem; width: 50px; height: 50px; background: #1e2a44; border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        .posto-item {
            background: #1e2a44;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .check-item {
            background: #1e2a44;
            border: 2px solid #475569;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.8rem;
        }
        .check-item.ok { border-color: var(--success); color: var(--success); }
        .check-item.pendencia { border-color: var(--danger); color: var(--danger); }

        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--primary);
            display: flex;
            border-top: 4px solid var(--accent);
            z-index: 1000;
        }

        .nav-item { flex: 1; text-align: center; padding: 12px 5px; color: #94a3b8; font-size: 0.65rem; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item div { font-size: 1.3rem; margin-bottom: 2px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="main-title">SENTINELA OPS</h1>
    <div style="font-size:1.3rem;">🛡️</div>
</div>

<div id="view-home" class="container">
    <div class="menu-item" onclick="showView('rondas')">
        <div class="menu-icon">📍</div>
        <div><b>REGISTRO DE RONDAS</b><br><small>Atividades táticas</small></div>
    </div>
    <div class="menu-item" onclick="showView('postos')">
        <div class="menu-icon">📋</div>
        <div><b>BASE DE POSTOS</b><br><small>Gerenciar locais</small></div>
    </div>
    <div class="menu-item" onclick="showView('perfil')">
        <div class="menu-icon">👤</div>
        <div><b>MEU PERFIL</b><br><small>Dados cadastrais</small></div>
    </div>
</div>

<div id="view-rondas" class="container hidden">
    <div class="card">
        <h3>NOVA ATIVIDADE</h3>
        <button id="btn-intervalo" class="btn btn-info" onclick="gerenciarIntervalo()">☕ INICIAR INTERVALO</button>
        
        <label>KM Atual</label>
        <input type="number" id="r-km" placeholder="Ex: 12540">

        <label>Posto / Local</label>
        <input type="text" id="r-posto" list="lista-sugestao-postos" placeholder="Selecione ou digite o posto">
        <datalist id="lista-sugestao-postos"></datalist>

        <label>Tipo de Atividade</label>
        <select id="r-motivo" onchange="toggleFiscalizacao()">
            <option value="Fiscalização">Fiscalização</option>
            <option value="Deslocamento">Deslocamento</option>
            <option value="Apoio">Apoio</option>
        </select>

        <div id="sec-fiscalizacao">
            <label>Checklist</label>
            <div class="checklist-grid" id="checklist">
                <div class="check-item ok" onclick="toggleCheck(this)">UNIFORME</div>
                <div class="check-item ok" onclick="toggleCheck(this)">POSTURA</div>
                <div class="check-item ok" onclick="toggleCheck(this)">LIVRO</div>
                <div class="check-item ok" onclick="toggleCheck(this)">MATERIAL</div>
            </div>
        </div>

        <label>Observações</label>
        <textarea id="r-obs" rows="2"></textarea>

        <button class="btn btn-primary" onclick="salvarRonda()">✅ SALVAR REGISTRO</button>
    </div>

    <div class="card">
        <h3>LOG RECENTE</h3>
        <div id="historico-rondas"></div>
        <button class="btn btn-danger" onclick="zerarPlantao()" style="margin-top:15px; font-size: 0.8rem; padding: 10px;">🗑️ LIMPAR TUDO</button>
    </div>
</div>

<div id="view-postos" class="container hidden">
    <div class="card">
        <h3>ADICIONAR POSTO</h3>
        <input type="text" id="novo-posto-nome" placeholder="Nome do Posto">
        <button class="btn btn-primary" onclick="adicionarPosto()">➕ CADASTRAR NOVO</button>
    </div>

    <div class="card">
        <h3>PESQUISAR POSTOS</h3>
        <input type="text" id="busca-posto" placeholder="Filtrar por nome..." onkeyup="renderPostos()">
        <div id="lista-postos"></div>
    </div>
</div>

<div id="view-perfil" class="container hidden">
    <div class="card">
        <h3>DADOS DO COLABORADOR</h3>
        <label>Nome</label><input type="text" id="p-nome">
        <label>Placa</label><input type="text" id="p-placa">
        <label>Matrícula</label><input type="text" id="p-mat">
        <button class="btn btn-primary" onclick="salvarPerfil()">SALVAR PERFIL</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="showView('home')"><div>🏠</div>HOME</div>
    <div class="nav-item" id="nav-rondas" onclick="showView('rondas')"><div>📍</div>RONDAS</div>
    <div class="nav-item" id="nav-postos" onclick="showView('postos')"><div>📋</div>POSTOS</div>
    <div class="nav-item" id="nav-perfil" onclick="showView('perfil')"><div>👤</div>PERFIL</div>
</nav>

<script>
    const iniciais = ["10º TABELIONATO", "COLÉGIO DOM FELICIANO", "COLÉGIO STELLA MARIS", "COND ALPHAVILLE POA", "ZAFFARI - IPANEMA"];
    
    let db = JSON.parse(localStorage.getItem('sentinela_ops_db')) || { 
        perfil: {}, 
        postos: iniciais.map(n => ({nome: n})), 
        rondas: [], 
        intervaloAtivo: null 
    };

    function saveDB() { localStorage.setItem('sentinela_ops_db', JSON.stringify(db)); }

    function showView(view) {
        document.querySelectorAll('.container').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('nav-' + view).classList.add('active');
        
        if(view === 'postos') renderPostos();
        if(view === 'rondas') {
            renderRondas();
            atualizarSugestoes();
            atualizarBotaoIntervalo();
        }
        if(view === 'perfil') carregarPerfil();
    }

    // --- LOGICA DE POSTOS ---
    function adicionarPosto() {
        const nome = document.getElementById('novo-posto-nome').value.trim().toUpperCase();
        if (!nome) return alert("Digite o nome!");
        if (db.postos.some(p => p.nome === nome)) return alert("Já existe!");
        
        db.postos.push({ nome: nome });
        saveDB();
        document.getElementById('novo-posto-nome').value = '';
        renderPostos();
        alert("✅ Posto adicionado!");
    }

    function excluirPosto(idx) {
        if(confirm("Excluir este posto permanentemente?")) {
            db.postos.splice(idx, 1);
            saveDB();
            renderPostos();
        }
    }

    function renderPostos() {
        const busca = document.getElementById('busca-posto').value.toLowerCase();
        const lista = document.getElementById('lista-postos');
        const filtrados = db.postos.filter(p => p.nome.toLowerCase().includes(busca));

        lista.innerHTML = filtrados.map((p, i) => `
            <div class="posto-item">
                <div style="font-weight:bold;">${p.nome}</div>
                <div style="display:flex; gap:5px;">
                    <button class="btn-small" style="background:#334155; color:white;" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(p.nome)}')">📍</button>
                    <button class="btn-small btn-danger" onclick="excluirPosto(${db.postos.indexOf(p)})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function atualizarSugestoes() {
        const dl = document.getElementById('lista-sugestao-postos');
        dl.innerHTML = db.postos.map(p => `<option value="${p.nome}">`).join('');
    }

    // --- LOGICA DE RONDAS ---
    function salvarRonda() {
        const posto = document.getElementById('r-posto').value.toUpperCase();
        if(!posto) return alert("Informe o posto!");

        const novaRonda = {
            id: Date.now(),
            posto: posto,
            hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            km: document.getElementById('r-km').value || "---",
            motivo: document.getElementById('r-motivo').value
        };

        db.rondas.push(novaRonda);
        saveDB();
        renderRondas();
        alert("✅ Ronda registrada!");
        document.getElementById('r-km').value = '';
        document.getElementById('r-posto').value = '';
    }

    function renderRondas() {
        const log = document.getElementById('historico-rondas');
        log.innerHTML = db.rondas.slice().reverse().map(r => `
            <div style="padding:10px; border-bottom:1px solid #334155; font-size:0.9rem;">
                <span style="color:var(--accent)">${r.hora}</span> | <b>${r.posto}</b><br>
                <small>${r.motivo} - KM: ${r.km}</small>
            </div>
        `).join('');
    }

    function gerenciarIntervalo() {
        if (!db.intervaloAtivo) {
            db.intervaloAtivo = Date.now();
            alert("☕ Intervalo iniciado!");
        } else {
            const min = Math.round((Date.now() - db.intervaloAtivo) / 60000);
            db.rondas.push({ posto: "☕ INTERVALO", hora: "FIM", motivo: `Duração: ${min} min`, km: "---" });
            db.intervaloAtivo = null;
            alert("✅ Intervalo finalizado!");
        }
        saveDB();
        renderRondas();
        atualizarBotaoIntervalo();
    }

    function atualizarBotaoIntervalo() {
        const btn = document.getElementById('btn-intervalo');
        if (db.intervaloAtivo) {
            btn.innerText = "🛑 ENCERRAR INTERVALO";
            btn.classList.replace('btn-info', 'btn-danger');
        } else {
            btn.innerText = "☕ INICIAR INTERVALO";
            btn.classList.replace('btn-danger', 'btn-info');
        }
    }

    function toggleCheck(el) {
        el.classList.toggle('ok');
        el.classList.toggle('pendencia');
    }

    function toggleFiscalizacao() {
        const m = document.getElementById('r-motivo').value;
        document.getElementById('sec-fiscalizacao').style.display = (m === 'Fiscalização') ? 'block' : 'none';
    }

    function zerarPlantao() {
        if(confirm("Limpar todos os registros do histórico?")) {
            db.rondas = [];
            saveDB();
            renderRondas();
        }
    }

    // --- PERFIL ---
    function salvarPerfil() {
        db.perfil = {
            nome: document.getElementById('p-nome').value,
            placa: document.getElementById('p-placa').value,
            mat: document.getElementById('p-mat').value
        };
        saveDB();
        alert("Perfil atualizado!");
    }

    function carregarPerfil() {
        document.getElementById('p-nome').value = db.perfil.nome || '';
        document.getElementById('p-placa').value = db.perfil.placa || '';
        document.getElementById('p-mat').value = db.perfil.mat || '';
    }

    window.onload = () => showView('home');
</script>
</body>
</html>
