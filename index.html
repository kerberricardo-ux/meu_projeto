<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FortGuard - Gestão de Rondas</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #0a192f;
            --secondary: #112240;
            --accent: #ffd600;
            --bg: #0d1117;
            --text: #e6edf3;
            --white: #ffffff;
            --danger: #f85149;
            --success: #238636;
            --border: #30363d;
        }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        .header { background: var(--primary); color: var(--white); padding: 12px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .status-dot { width: 10px; height: 10px; background: #2ea043; border-radius: 50%; box-shadow: 0 0 8px #2ea043; }
        .container { padding: 12px; max-width: 600px; margin: auto; }
        .card { background: var(--secondary); border-radius: 4px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; font-size: 1rem; color: var(--white); }
        .btn { border: none; padding: 12px; border-radius: 4px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; }
        .btn-save { background: var(--success); color: white; }
        .btn-delete { background: #484f58; color: white; }
        .btn-pdf { background: #1f6feb; color: white; }
        .btn-report { background: #ffd600; color: #0a192f; margin-bottom: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); display: flex; border-top: 1px solid var(--accent); padding: 8px 0; z-index: 100; }
        .nav-item { cursor: pointer; text-align: center; font-size: 0.65rem; flex: 1; color: #8b949e; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--accent); }
        .nav-item div { font-size: 1.2rem; margin-bottom: 2px; }
        .hidden { display: none !important; }
        .viatura-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(255,214,0,0.05); padding: 10px; border-radius: 4px; border: 1px dashed var(--accent); }
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .check-item { background: #161b22; padding: 10px; border-radius: 4px; text-align: center; cursor: pointer; border: 1px solid var(--border); font-size: 0.65rem; font-weight: bold; }
        .check-item.ok { border-color: #238636; color: #39d353; background: rgba(35, 134, 54, 0.1); }
        .check-item.pendencia { border-color: #f85149; color: #ff7b72; background: rgba(248, 81, 73, 0.1); }
        .posto-item { border-left: 4px solid var(--accent); position: relative; }
        .editable-field { background: #0d1117; padding: 8px; border-radius: 4px; border: 1px solid var(--border); margin: 5px 0; font-size: 0.8rem; min-height: 20px; color: #c9d1d9; }
        .delete-icon { position: absolute; top: 10px; right: 10px; color: #6e7681; cursor: pointer; }
        #preview-foto { width: 100%; border-radius: 4px; margin-top: 10px; display: none; border: 1px solid var(--border); }
        .ronda-entry { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0d1117; margin-bottom: 5px; border-radius: 4px; }
        #qrcode-container { display: none; }
    </style>
</head>
<body>

<div id="qrcode-container"></div>

<div class="header">
    <h1>FORTGUARD OPS</h1>
    <div class="status-dot"></div>
</div>

<div id="view-perfil" class="container">
    <div class="card">
        <h3>👤 IDENTIFICAÇÃO DE SUPERVISÃO</h3>
        <label>Nome Completo:</label> <input type="text" id="p-nome">
        <label>Cargo:</label> <input type="text" id="p-cargo">
        <label>Matrícula:</label> <input type="number" id="p-matrícula">
        <label>Placa VTR:</label> <input type="text" id="p-placa" placeholder="ABC-1234">
        <label>Empresa:</label> <input type="text" id="p-empresa">
        <label>CNPJ da Empresa:</label> <input type="text" id="p-cnpj" placeholder="00.000.000/0001-00">
        <button class="btn btn-save" onclick="salvarPerfil()">GRAVAR DADOS</button>
    </div>
</div>

<div id="view-rondas" class="container hidden">
    <div class="card">
        <h3>📋 REGISTRO OPERACIONAL</h3>
        <div class="viatura-inputs">
            <div><label>VTR:</label><input type="text" id="r-placa" readonly style="color:var(--accent)"></div>
            <div><label>KM:</label><input type="number" id="r-km"></div>
        </div>
        <label>Posto Alvo:</label> <select id="r-posto"></select>
        <label>Colaborador de Plantão:</label> <input type="text" id="r-func">
        <label>Missão:</label> 
        <select id="r-motivo" onchange="toggleFiscalizacao()">
            <option value="Deslocamento">Deslocamento</option>
            <option value="Fiscalização" selected>Fiscalização</option>
            <option value="Entrega de Material">Entrega de Material</option>
            <option value="Ronda Noturna">Ronda Noturna</option>
        </select>
        <div id="sec-fiscalizacao">
            <label>CHECKLIST TÁTICO:</label>
            <div class="checklist-grid" id="checklist">
                <div class="check-item" onclick="toggleCheck(this)">APRESENTAÇÃO</div>
                <div class="check-item" onclick="toggleCheck(this)">UNIFORME</div>
                <div class="check-item" onclick="toggleCheck(this)">POSTURA</div>
                <div class="check-item" onclick="toggleCheck(this)">LIVRO OCOR.</div>
                <div class="check-item" onclick="toggleCheck(this)">MATERIAL</div>
                <div class="check-item" onclick="toggleCheck(this)">OUTROS</div>
            </div>
        </div>
        <label>Notas de Campo:</label> <textarea id="r-obs" rows="2"></textarea>
        <label>Evidência Fotográfica:</label>
        <input type="file" id="r-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
        <img id="preview-foto" src="#">
        <button class="btn btn-save" onclick="salvarRonda()">FINALIZAR REGISTRO</button>
    </div>
    <div class="card">
        <h3>📊 LOG DE ATIVIDADES</h3>
        <p style="font-size:0.7rem">TOTAL DE VISITAS: <span id="qtd-rondas" style="color:var(--accent)">0</span></p>
        <button class="btn btn-report" onclick="gerarRelatorioGeral()">📋 GERAR RELATÓRIO GERAL (PDF)</button>
        <button class="btn btn-delete" onclick="zerarRondas()" style="font-size:0.7rem; background:#222; border: 1px solid var(--border)">ENCERRAR PLANTÃO (ZERAR)</button>
        <hr>
        <div id="historico-rondas"></div>
    </div>
</div>

<div id="view-postos" class="container hidden">
    <div class="card">
        <h3>📍 BASE DE POSTOS</h3>
        <input type="text" id="busca-posto" placeholder="Filtrar base..." onkeyup="renderPostos()">
        <div id="lista-postos" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="view-config" class="container hidden">
    <div class="card">
        <h3>⚙️ TERMINAL ADMINISTRATIVO</h3>
        <div id="lock-screen">
            <label>PIN DE ACESSO:</label>
            <input type="password" id="pin-input" maxlength="4">
            <button class="btn btn-save" onclick="checkPin()">AUTENTICAR</button>
        </div>
        <div id="config-content" class="hidden">
            <div style="background: rgba(255,255,255,0.03); padding: 12px; border: 1px solid var(--border);">
                <strong style="color:var(--accent); font-size:0.7rem;">CADASTRO MANUAL</strong>
                <label>Nome:</label><input type="text" id="adm-nome-posto">
                <label>Endereço:</label><input type="text" id="adm-end-posto">
                <label>Telefone:</label><input type="text" id="adm-tel-posto">
                <button class="btn btn-save" onclick="adicionarPostoManual()">ADICIONAR À BASE</button>
            </div>
            <button class="btn btn-delete" onclick="limparTodosPostos()" style="background:#333; margin-top:20px">APAGAR TODA A BASE</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" id="nav-perfil" onclick="showView('perfil')"><div>👤</div>PERFIL</div>
    <div class="nav-item" id="nav-rondas" onclick="showView('rondas')"><div>📋</div>RONDAS</div>
    <div class="nav-item" id="nav-postos" onclick="showView('postos')"><div>📍</div>POSTOS</div>
    <div class="nav-item" id="nav-config" onclick="showView('config')"><div>⚙️</div>ADMIN</div>
</nav>

<script>
    const postosIniciais = ["10º TABELIONATO", "COLÉGIO DOM FELICIANO", "COLÉGIO STELLA MARIS", "COND ALPHAVILLE POA", "COND CASA 100", "COND MARIA VILAC", "COND SOLAR SEVILHA", "COND TREND NOVA CARLOS GOMES", "COND VINTAGE", "CONDOMINIO EDIFICIO FURRIEL", "CONDOMINIO SAINT MORITZ", "CONDOMÍNIO REBOUÇAS 180", "GERMANIA MALL", "INATIVO", "INATIVO (INSS)", "INSTITUTO RELIGIOSO BARBARA MAIX", "JOSAPAR (Menino Deus)", "JOSAPAR (TRAMANDAI)", "JOSAPAR (TORRES)", "JOSAPAR (TERESOPOLIS)", "JOSAPAR( CAPÃO DA CANOA )", "MedCenter", "PANVEL - 24 DE OUTUBRO", "PANVEL - ALVORADA", "PANVEL - ANITA GARIBALDI", "PANVEL - CASEMIRO DE ABREU", "PANVEL - MINI CD CAVALHADA", "PANVEL - MINI CD PROTÁSIO ALVES", "PANVEL - NILO PEÇANHA", "PANVEL - OSCAR PEREIRA", "PANVEL - PLÍNIO BRASIL MILANO", "PANVEL - TERESÓPOLIS", "PANVEL - VICENTE DA FONTOURA", "QUANTICA - RESERVA", "QUÂNTICA - ADMINISTRATIVO", "QUÂNTICA - OPERACIONAL", "SHOPPING JOÃO PESSOA", "VIVA OPEN MALL - MONITORAMENTO", "VIVA OPEN MALL - SEGURANÇA", "ZAFFARI - CABRAL", "ZAFFARI - CAVALHADA", "ZAFFARI - CESTTO GRAVATAI", "ZAFFARI - CESTTO PROTÁSIO", "ZAFFARI - CESTTO VIAMÃO", "ZAFFARI - CESTTO WENCESLAU ESCOBAR", "ZAFFARI - CRISTOVÃO COLOMBO", "ZAFFARI - FERNANDES VIEIRA", "ZAFFARI - IPANEMA", "ZAFFARI - LINDÓIA", "ZAFFARI - PROTÁSIO ALVES"];

    let db = JSON.parse(localStorage.getItem('fortguard_ronda_db')) || { perfil: {}, postos: postosIniciais.map(n => ({nome:n, endereco:"", telefone:""})), rondas: [] };
    let fotoBase64 = "";

    function saveDB() { localStorage.setItem('fortguard_ronda_db', JSON.stringify(db)); }

    function showView(view) {
        document.querySelectorAll('.container').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.getElementById('nav-' + view).classList.add('active');
        if(view === 'rondas') {
            document.getElementById('r-placa').value = db.perfil.placa || "N/A";
            atualizarSelectPostos();
            renderRondas();
        }
        if(view === 'postos') renderPostos();
    }

    function checkPin() {
        if(document.getElementById('pin-input').value === "1234") {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('config-content').classList.remove('hidden');
        } else { alert("PIN INCORRETO"); }
    }

    function renderPostos() {
        const lista = document.getElementById('lista-postos');
        const busca = document.getElementById('busca-posto').value.toLowerCase();
        lista.innerHTML = "";
        db.postos.filter(p => p.nome.toLowerCase().includes(busca)).sort((a,b) => a.nome.localeCompare(b.nome)).forEach((p, index) => {
            lista.innerHTML += `
                <div class="card posto-item">
                    <span class="delete-icon" onclick="excluirPosto(${index})">✕</span>
                    <strong style="font-size:0.8rem">${p.nome}</strong>
                    <div class="editable-field" contenteditable="true" onblur="db.postos[${index}].endereco=this.innerText;saveDB()">${p.endereco || 'Endereço não informado'}</div>
                    <div class="editable-field" contenteditable="true" onblur="db.postos[${index}].telefone=this.innerText;saveDB()">${p.telefone || 'Telefone não informado'}</div>
                </div>`;
        });
    }

    function adicionarPostoManual() {
        const nome = document.getElementById('adm-nome-posto').value;
        if(!nome) return;
        db.postos.push({
            nome: nome, 
            endereco: document.getElementById('adm-end-posto').value,
            telefone: document.getElementById('adm-tel-posto').value
        });
        saveDB(); renderPostos();
        document.getElementById('adm-nome-posto').value = "";
        document.getElementById('adm-end-posto').value = "";
        document.getElementById('adm-tel-posto').value = "";
    }

    function excluirPosto(idx) { if(confirm("Excluir posto?")) { db.postos.splice(idx, 1); saveDB(); renderPostos(); } }
    function limparTodosPostos() { if(confirm("APAGAR TUDO?")) { db.postos = []; saveDB(); renderPostos(); } }
    function zerarRondas() { if(confirm("DESEJA ENCERRAR O PLANTÃO E ZERAR AS RONDAS?")) { db.rondas = []; saveDB(); renderRondas(); } }

    function atualizarSelectPostos() {
        document.getElementById('r-posto').innerHTML = db.postos.map(p => `<option value="${p.nome}">${p.nome}</option>`).join('');
    }

    function toggleCheck(e) {
        if(!e.classList.contains('ok') && !e.classList.contains('pendencia')) e.classList.add('ok');
        else if(e.classList.contains('ok')) { e.classList.remove('ok'); e.classList.add('pendencia'); }
        else e.classList.remove('pendencia');
    }

    function toggleFiscalizacao() {
        document.getElementById('sec-fiscalizacao').classList.toggle('hidden', document.getElementById('r-motivo').value === "Deslocamento");
    }

    function previewImage(i) {
        const r = new FileReader();
        r.onload = (e) => { 
            fotoBase64 = e.target.result; 
            document.getElementById('preview-foto').src = fotoBase64;
            document.getElementById('preview-foto').style.display = "block";
        };
        r.readAsDataURL(i.files[0]);
    }

    function salvarPerfil() {
        db.perfil = {
            nome: document.getElementById('p-nome').value,
            cargo: document.getElementById('p-cargo').value,
            placa: document.getElementById('p-placa').value.toUpperCase(),
            empresa: document.getElementById('p-empresa').value,
            cnpj: document.getElementById('p-cnpj').value,
            matricula: document.getElementById('p-matrícula').value
        };
        saveDB(); alert("DADOS SALVOS!");
    }

    function salvarRonda() {
        if(!document.getElementById('r-km').value || !fotoBase64) return alert("KM e FOTO OBRIGATÓRIOS!");
        const nova = {
            data: new Date().toLocaleDateString(),
            hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            posto: document.getElementById('r-posto').value,
            km: document.getElementById('r-km').value,
            placa: db.perfil.placa,
            func: document.getElementById('r-func').value || "N/I",
            motivo: document.getElementById('r-motivo').value,
            obs: document.getElementById('r-obs').value || "S/O",
            foto: fotoBase64,
            checklist: Array.from(document.querySelectorAll('.check-item')).map(i => i.innerText + ": " + (i.classList.contains('ok') ? "OK" : i.classList.contains('pendencia') ? "PEND" : "N/A"))
        };
        db.rondas.push(nova);
        saveDB();
        if(confirm("RONDA SALVA! ENVIAR WHATSAPP?")) enviarWhatsApp(nova);
        location.reload();
    }

    function enviarWhatsApp(r) {
        const txt = `*RELATÓRIO DE RONDA - ${db.perfil.empresa}*%0A%0A*Posto:* ${r.posto}%0A*Data:* ${r.data} - ${r.hora}%0A*VTR:* ${r.placa} | *KM:* ${r.km}%0A*Supervisor:* ${db.perfil.nome}`;
        window.open(`https://api.whatsapp.com/send?text=${txt}`, '_blank');
    }

    function renderRondas() {
        document.getElementById('qtd-rondas').innerText = db.rondas.length;
        document.getElementById('historico-rondas').innerHTML = db.rondas.slice().reverse().map((r, i) => `
            <div class="ronda-entry">
                <div style="font-size:0.7rem"><strong>${r.hora}</strong> - ${r.posto}</div>
                <button class="btn btn-pdf" style="width:auto; padding:5px 10px; margin:0" onclick="gerarCardDigital(${db.rondas.length-1-i})">CARD</button>
            </div>`).join('');
    }

    // --- RELATÓRIO GERAL DO PLANTÃO ---
    function gerarRelatorioGeral() {
        if(db.rondas.length === 0) return alert("Sem dados para gerar relatório.");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 15;

        // Cabeçalho PDF Geral
        doc.setFontSize(16); doc.setFont("helvetica", "bold");
        doc.text("RELATÓRIO DE FECHAMENTO DE PLANTÃO", 105, y, { align: "center" });
        y += 10;
        
        doc.setFontSize(10); doc.setFont("helvetica", "normal");
        doc.text(`Empresa: ${db.perfil.empresa || 'N/A'} | Supervisor: ${db.perfil.nome || 'N/A'}`, 10, y);
        y += 5;
        doc.text(`Data do Fechamento: ${new Date().toLocaleDateString()} | Total de Rondas: ${db.rondas.length}`, 10, y);
        y += 10;

        // Tabela de Rondas
        doc.setFont("helvetica", "bold");
        doc.text("HORA", 10, y); doc.text("POSTO ALVO", 25, y); doc.text("COLABORADOR", 100, y); doc.text("KM", 160, y); doc.text("VTR", 185, y);
        y += 2;
        doc.line(10, y, 200, y);
        y += 6;

        doc.setFont("helvetica", "normal");
        db.rondas.forEach(r => {
            if(y > 280) { doc.addPage(); y = 20; }
            doc.text(r.hora, 10, y);
            doc.text(r.posto.substring(0, 35), 25, y);
            doc.text(r.func.substring(0, 25), 100, y);
            doc.text(r.km, 160, y);
            doc.text(r.placa, 185, y);
            y += 8;
        });

        doc.save(`Fechamento_Plantao_${new Date().toLocaleDateString()}.pdf`);
    }

    async function gerarCardDigital(idx) {
        const r = db.rondas[idx];
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "mm", format: [100, 160] });
        doc.setFillColor(10, 25, 47); doc.rect(0, 0, 100, 160, 'F');
        doc.setFillColor(255, 214, 0); doc.rect(0, 0, 100, 15, 'F');
        doc.setFont("helvetica", "bold"); doc.setFontSize(12); doc.setTextColor(10, 25, 47);
        doc.text("COMPROVANTE DE RONDA", 50, 10, { align: "center" });
        if(r.foto) { doc.setDrawColor(48, 54, 61); doc.rect(9, 19, 82, 62); doc.addImage(r.foto, 'JPEG', 10, 20, 80, 60); }
        doc.setTextColor(255, 214, 0); doc.setFontSize(14); doc.text(r.posto.toUpperCase(), 50, 90, { align: "center" });
        doc.setTextColor(230, 237, 243); doc.setFontSize(9); doc.setFont("helvetica", "normal");
        doc.text(`Data: ${r.data} | Hora: ${r.hora}`, 10, 98); doc.text(`VTR: ${r.placa} | KM: ${r.km}`, 10, 104);
        doc.setFont("helvetica", "bold"); doc.text("STATUS OPERACIONAL:", 10, 115);
        doc.setFontSize(8); doc.setFont("helvetica", "normal");
        r.checklist.forEach((c, i) => { doc.text(`• ${c}`, 10, 122 + (i * 5)); });
        const qrContainer = document.getElementById("qrcode-container"); qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: `VALIDO: ${r.posto} | ${r.data}`, width: 100, height: 100 });
        await new Promise(res => setTimeout(res, 300));
        const qrImg = qrContainer.querySelector("canvas").toDataURL("image/png");
        doc.addImage(qrImg, 'PNG', 75, 125, 20, 20);
        doc.setTextColor(139, 148, 158); doc.text("SUPERVISOR:", 10, 150);
        doc.setTextColor(255, 255, 255); doc.text(db.perfil.nome || "FISCAL", 10, 154);
        doc.save(`Card_${r.posto}.pdf`);
    }

    window.onload = () => {
        if(db.perfil.nome) {
            document.getElementById('p-nome').value = db.perfil.nome;
            document.getElementById('p-cargo').value = db.perfil.cargo;
            document.getElementById('p-matrícula').value = db.perfil.matricula;
            document.getElementById('p-placa').value = db.perfil.placa;
            document.getElementById('p-empresa').value = db.perfil.empresa;
            document.getElementById('p-cnpj').value = db.perfil.cnpj;
        }
        renderRondas();
    };
</script>
</body>
</html>
