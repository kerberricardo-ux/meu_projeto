<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINELA OPS - Sistema de Ronda</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #0a192f;
            --secondary: #112240;
            --accent: #ffd600;
            --bg: #f4f7f6;
            --text-main: #112240;
            --white: #ffffff;
            --danger: #f85149;
            --success: #238636;
            --border: #e1e4e8;
            --info: #007bff;
        }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 80px; }

        /* HEADER */
        .header { background: var(--primary); color: var(--white); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 1rem; font-weight: 800; text-transform: uppercase; flex-grow: 1; text-align: center; }

        /* MENU */
        .menu-container { padding: 12px; max-width: 500px; margin: auto; }
        .menu-item { background: var(--white); border-radius: 10px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid var(--border); cursor: pointer; }
        
        /* FORMULÁRIO */
        .container { padding: 12px; max-width: 600px; margin: auto; }
        .card-ui { background: var(--white); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-ui h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 8px; font-size: 0.85rem; text-transform: uppercase; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        
        /* BOTÕES */
        .btn { border: none; padding: 14px; border-radius: 6px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; }
        .btn-save { background: var(--primary); color: var(--accent); }
        .btn-break { background: var(--info); color: white; }
        .btn-break.active { background: var(--danger); animation: pulse 2s infinite; }

        /* CHECKLIST */
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .check-item { background: #f1f3f5; padding: 12px; border-radius: 6px; text-align: center; cursor: pointer; border: 1px solid var(--border); font-size: 0.7rem; font-weight: bold; }
        .check-item.ok { border-color: var(--success); color: var(--success); background: rgba(35, 134, 54, 0.1); }

        .ronda-entry { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; margin-bottom: 5px; border-radius: 6px; }
        .entry-break { border-left: 5px solid var(--info); background: #eef7ff; }

        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--primary); display: flex; border-top: 1px solid var(--accent); padding: 8px 0; }
        .nav-item { cursor: pointer; text-align: center; font-size: 0.65rem; flex: 1; color: #8b949e; font-weight: bold; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="header">
    <div onclick="showView('home')" style="cursor:pointer;">←</div>
    <h1 id="main-title">SENTINELA OPS</h1>
    <div style="width:10px; height:10px; background:#2ea043; border-radius:50%;"></div>
</div>

<div id="view-home" class="container">
    <div class="menu-container">
        <div class="menu-item" onclick="showView('rondas')"><b>🛡️ RONDAS</b></div>
        <div class="menu-item" onclick="showView('perfil')"><b>👤 MEU PERFIL</b></div>
    </div>
</div>

<div id="view-rondas" class="container hidden">
    <div class="card-ui">
        <h3>📋 REGISTRO DE ATIVIDADE</h3>
        <button id="btn-intervalo" class="btn btn-break" onclick="gerenciarIntervalo()">☕ INICIAR INTERVALO</button>
        
        <label>VTR e KM:</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="r-placa" placeholder="Placa" readonly>
            <input type="number" id="r-km" placeholder="KM Atual">
        </div>

        <label>Posto:</label>
        <select id="r-posto">
            <option value="COND SOLAR SEVILHA">COND SOLAR SEVILHA</option>
            <option value="ZAFFARI IPANEMA">ZAFFARI IPANEMA</option>
        </select>

        <label>Motivo da Visita:</label>
        <select id="r-motivo">
            <option value="Fiscalização">Fiscalização</option>
            <option value="Deslocamento">Deslocamento</option>
            <option value="Entrega de Material">Entrega de Material</option>
            <option value="Outros">Outros</option>
        </select>

        <label>Checklist Operacional:</label>
        <div class="checklist-grid" id="checklist">
            <div class="check-item ok" onclick="this.classList.toggle('ok')">APRESENTAÇÃO</div>
            <div class="check-item ok" onclick="this.classList.toggle('ok')">UNIFORME</div>
            <div class="check-item ok" onclick="this.classList.toggle('ok')">POSTURA</div>
            <div class="check-item ok" onclick="this.classList.toggle('ok')">LIVRO OCOR.</div>
        </div>

        <label>Observações:</label>
        <textarea id="r-obs" rows="2"></textarea>

        <button class="btn btn-save" onclick="salvarRonda()">FINALIZAR E GERAR CARD</button>
    </div>

    <div class="card-ui">
        <h3>📊 HISTÓRICO RECENTE</h3>
        <div id="historico-rondas"></div>
    </div>
</div>

<div id="view-perfil" class="container hidden">
    <div class="card-ui">
        <h3>👤 DADOS DO COLABORADOR</h3>
        <label>Nome Completo:</label> <input type="text" id="p-nome" placeholder="Ex: Gisele Vieira">
        <label>Matrícula:</label> <input type="text" id="p-matr" placeholder="000">
        <label>Placa da VTR:</label> <input type="text" id="p-placa" placeholder="JBY-3E93">
        <button class="btn btn-save" onclick="salvarPerfil()">SALVAR PERFIL</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showView('home')">HOME</div>
    <div class="nav-item" onclick="showView('rondas')">RONDAS</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('sentinela_db')) || { perfil: {}, rondas: [], intervaloAtivo: null };

    function saveDB() { localStorage.setItem('sentinela_db', JSON.stringify(db)); }

    function showView(view) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        if(view === 'rondas') {
            document.getElementById('r-placa').value = db.perfil.placa || "";
            renderRondas();
            atualizarBotaoIntervalo();
        }
    }

    function gerenciarIntervalo() {
        const agora = new Date();
        if (!db.intervaloAtivo) {
            db.intervaloAtivo = agora.getTime();
            alert("Intervalo iniciado!");
        } else {
            const inicio = new Date(db.intervaloAtivo);
            const duracao = Math.round((agora - inicio) / 60000);
            db.rondas.push({
                isIntervalo: true,
                posto: "INTERVALO / JANTA",
                hora: inicio.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                fim: agora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                duracao: duracao
            });
            db.intervaloAtivo = null;
            alert("Intervalo finalizado!");
        }
        saveDB(); renderRondas(); atualizarBotaoIntervalo();
    }

    function atualizarBotaoIntervalo() {
        const btn = document.getElementById('btn-intervalo');
        if (db.intervaloAtivo) {
            btn.innerText = "🛑 FINALIZAR INTERVALO";
            btn.classList.add('active');
        } else {
            btn.innerText = "☕ INICIAR INTERVALO / JANTA";
            btn.classList.remove('active');
        }
    }

    function salvarRonda() {
        const novaRonda = {
            id: Date.now(),
            data: new Date().toLocaleDateString(),
            hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            posto: document.getElementById('r-posto').value,
            motivo: document.getElementById('r-motivo').value,
            km: document.getElementById('r-km').value,
            obs: document.getElementById('r-obs').value
        };
        db.rondas.push(novaRonda);
        saveDB();
        renderRondas();
        alert("Ronda registrada com sucesso!");
    }

    function renderRondas() {
        const log = document.getElementById('historico-rondas');
        log.innerHTML = db.rondas.slice().reverse().map(r => `
            <div class="ronda-entry ${r.isIntervalo ? 'entry-break' : ''}">
                <div>
                    <b>${r.hora} ${r.fim ? '- ' + r.fim : ''}</b><br>
                    <span>${r.posto} ${r.duracao ? '('+r.duracao+' min)' : ''}</span>
                </div>
                <small>${r.isIntervalo ? '☕' : '🛡️'}</small>
            </div>
        `).join('');
    }

    function salvarPerfil() {
        db.perfil = { 
            nome: document.getElementById('p-nome').value, 
            placa: document.getElementById('p-placa').value,
            matr: document.getElementById('p-matr').value
        };
        saveDB();
        alert("Perfil atualizado!");
    }

    window.onload = () => showView('home');
</script>
</body>
</html>
