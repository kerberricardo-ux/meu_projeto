<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINELA OPS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #0a192f; --accent: #ffd600; --danger: #f85149;
            --success: #238636; --bg: #0f1c2e; --card: #16233a;
            --text: #e0e7ff; --text-light: #a3bffa;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 75px; line-height: 1.4; }
        .header { background: var(--primary); color: white; padding: 14px 16px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; font-weight: bold; }
        .header h1 { margin: 0; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .container { padding: 12px; max-width: 640px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #334155; border-radius: 8px; padding: 18px; margin-bottom: 16px; }
        .card h3 { margin: 0 0 16px 0; padding-bottom: 10px; border-bottom: 3px solid var(--accent); color: var(--accent); font-size: 0.98rem; text-transform: uppercase; font-weight: 700; }
        label { display: block; font-size: 0.76rem; font-weight: 600; color: #94a3b8; margin: 14px 0 5px 0; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 13px 14px; background: #1e2a44; border: 1px solid #475569; border-radius: 6px; color: white; font-size: 1rem; }
        .btn { width: 100%; padding: 16px; margin-top: 12px; border: none; border-radius: 6px; font-weight: 700; font-size: 0.96rem; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: var(--accent); color: #0a192f; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: #2563eb; color: white; }
        .posto-item { background: var(--card); border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .ronda-entry { background: #1e2a44; padding: 13px; border-radius: 6px; margin-bottom: 9px; border-left: 5px solid var(--accent); font-size: 0.87rem; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); display: flex; border-top: 4px solid var(--accent); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 10px 6px; color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .hidden { display: none !important; }
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
        .check-item { background: #1e2a44; border: 2px solid #475569; padding: 13px 10px; border-radius: 6px; text-align: center; font-size: 0.79rem; cursor: pointer; }
        .check-item.ok { border-color: var(--success); color: var(--success); background: rgba(35, 134, 54, 0.2); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="main-title">SENTINELA OPS</h1>
    <div style="font-size:1.5rem;">🛡️</div>
</div>

<div id="view-home" class="container">
    <div class="card" onclick="showView('rondas')" style="cursor:pointer;">📍 <b>REGISTRO DE RONDAS</b></div>
    <div class="card" onclick="showView('postos')" style="cursor:pointer;">📋 <b>BASE DE POSTOS / ROTAS</b></div>
    <div class="card" onclick="gerarRelatorioPlantao()" style="cursor:pointer;">📄 <b>RELATÓRIO DE PLANTÃO (PDF)</b></div>
    <div class="card" onclick="showView('perfil')" style="cursor:pointer;">👤 <b>MEU PERFIL</b></div>
</div>

<div id="view-rondas" class="container hidden">
    <div class="card">
        <h3>REGISTRO OPERACIONAL</h3>
        <button id="btn-intervalo" class="btn btn-info" onclick="gerenciarIntervalo()">☕ INICIAR INTERVALO / JANTA</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
            <div><label>Viatura</label><input type="text" id="r-placa" readonly></div>
            <div><label>KM Atual</label><input type="number" id="r-km"></div>
        </div>
        <label>Posto / Local</label><select id="r-posto"></select>
        <label>Colaborador no Local</label><input type="text" id="r-func">
        <label>Missão</label>
        <select id="r-motivo" onchange="toggleFiscalizacao()">
            <option value="Fiscalização">Fiscalização</option>
            <option value="Deslocamento">Deslocamento</option>
            <option value="Entrega de Material">Entrega de Material</option>
            <option value="Outros">Outros</option>
        </select>
        <div id="sec-fiscalizacao">
            <label>CHECKLIST TÁTICO</label>
            <div class="checklist-grid" id="checklist">
                <div class="check-item ok" onclick="toggleCheck(this)">APRESENTAÇÃO</div>
                <div class="check-item ok" onclick="toggleCheck(this)">UNIFORME</div>
                <div class="check-item ok" onclick="toggleCheck(this)">POSTURA</div>
                <div class="check-item ok" onclick="toggleCheck(this)">LIVRO OCORRÊNCIA</div>
                <div class="check-item ok" onclick="toggleCheck(this)">MATERIAL</div>
                <div class="check-item ok" onclick="toggleCheck(this)">OUTROS</div>
            </div>
        </div>
        <label>Observações</label><textarea id="r-obs" rows="3"></textarea>
        <label>Foto</label><input type="file" id="r-foto" accept="image/*" capture="environment" onchange="previewImage(this)">
        <button class="btn btn-primary" onclick="salvarRonda()">✅ FINALIZAR E GERAR CARD</button>
        <button class="btn btn-danger" onclick="zerarPlantao()">🗑️ ZERAR PLANTÃO</button>
    </div>
    <div class="card"><h3>LOG DE ATIVIDADES</h3><div id="historico-rondas"></div></div>
</div>

<div id="view-postos" class="container hidden">
    <div class="card">
        <h3>BASE DE POSTOS</h3>
        <button class="btn btn-primary" onclick="adicionarPosto()">➕ ADICIONAR NOVO POSTO</button>
        <input type="text" id="busca-posto" placeholder="Pesquisar..." onkeyup="renderPostos()" style="margin-top:15px;">
        <div id="lista-postos" style="margin-top:15px;"></div>
    </div>
</div>

<div id="view-perfil" class="container hidden">
    <div class="card">
        <h3>MEU PERFIL OPERACIONAL</h3>
        <label>Nome Completo</label><input type="text" id="p-nome">
        <label>Matrícula</label><input type="text" id="p-matrícula">
        <label>Cargo</label><input type="text" id="p-cargo">
        <label>Viatura (Placa)</label><input type="text" id="p-placa">
        <label>Empresa</label><input type="text" id="p-empresa">
        <label>CNPJ</label><input type="text" id="p-cnpj">
        <button class="btn btn-primary" onclick="salvarPerfil()">SALVAR DADOS</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" id="nav-home" onclick="showView('home')">🏠 HOME</div>
    <div class="nav-item" id="nav-rondas" onclick="showView('rondas')">📍 RONDAS</div>
    <div class="nav-item" id="nav-postos" onclick="showView('postos')">📋 POSTOS</div>
    <div class="nav-item" id="nav-perfil" onclick="showView('perfil')">👤 PERFIL</div>
</nav>

<script>
    let db = JSON.parse(localStorage.getItem('sentinela_ops_db')) || { perfil: {}, postos: [], rondas: [], intervaloAtivo: null };
    let fotoBase64 = "";

    function saveDB() { localStorage.setItem('sentinela_ops_db', JSON.stringify(db)); }

    function showView(view) {
        document.querySelectorAll('.container').forEach(v => v.classList.add('hidden'));
        document.getElementById('view-' + view).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const nav = document.getElementById('nav-' + view); if(nav) nav.classList.add('active');
        if (view === 'rondas') {
            document.getElementById('r-placa').value = db.perfil.placa || "";
            const sel = document.getElementById('r-posto');
            sel.innerHTML = '<option value="">Selecione um posto...</option>';
            db.postos.forEach(p => sel.innerHTML += `<option value="${p.nome}">${p.nome}</option>`);
            renderRondas();
            atualizarBotaoIntervalo();
        }
        if (view === 'perfil') {
            document.getElementById('p-nome').value = db.perfil.nome || "";
            document.getElementById('p-matrícula').value = db.perfil.matricula || "";
            document.getElementById('p-cargo').value = db.perfil.cargo || "";
            document.getElementById('p-placa').value = db.perfil.placa || "";
            document.getElementById('p-empresa').value = db.perfil.empresa || "";
            document.getElementById('p-cnpj').value = db.perfil.cnpj || "";
        }
        if (view === 'postos') renderPostos();
    }

    function salvarRonda() {
        const checklist = {};
        document.querySelectorAll('#checklist .check-item').forEach(item => {
            checklist[item.innerText] = item.classList.contains('ok') ? 'OK' : 'PEND';
        });
        const ronda = {
            id: Date.now(), posto: document.getElementById('r-posto').value || "SEM POSTO",
            motivo: document.getElementById('r-motivo').value, km: document.getElementById('r-km').value || '0',
            data: new Date().toLocaleDateString('pt-BR'), hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
            colaborador_posto: document.getElementById('r-func').value || "N/A", obs: document.getElementById('r-obs').value || 'Sn.',
            checklist: checklist, foto: fotoBase64, isIntervalo: false
        };
        db.rondas.push(ronda); saveDB(); renderRondas();
        gerarCardIndividual(ronda.id);
        fotoBase64 = ""; document.getElementById('r-km').value = ''; document.getElementById('r-obs').value = ''; document.getElementById('r-func').value = '';
    }

    async function gerarCardIndividual(id) {
        const r = db.rondas.find(item => item.id === id); if (!r) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: [80, 200] });
        let y = 10;
        doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.text("COMPROVANTE DE RONDA", 40, y, { align: "center" });
        y += 5; if (r.foto) { try { doc.addImage(r.foto, 'JPEG', 5, y, 70, 45); y += 50; } catch (e) { y += 5; } }
        doc.setFontSize(11); doc.text(r.posto.toUpperCase(), 40, y, { align: "center" });
        y += 7; doc.setFontSize(8); doc.setFont("helvetica", "normal");
        doc.text(`Data: ${r.data} | Hora: ${r.hora}`, 5, y);
        y += 5; doc.text(`VTR: ${db.perfil.placa || "---"} | KM: ${r.km}`, 5, y);
        y += 5; doc.text(`COLABORADOR: ${r.colaborador_posto.toUpperCase()}`, 5, y);
        y += 8; doc.setFont("helvetica", "bold"); doc.text("STATUS OPERACIONAL:", 5, y);
        Object.entries(r.checklist || {}).forEach(([item, status]) => { y += 5; doc.setFont("helvetica", "normal"); doc.text(`• ${item}: ${status}`, 8, y); });
        y += 8; doc.setFont("helvetica", "bold"); doc.text("OBSERVAÇÕES:", 5, y);
        const obs = doc.splitTextToSize(r.obs, 70); doc.setFont("helvetica", "normal"); doc.text(obs, 5, y + 5);
        y += (obs.length * 5) + 15; doc.setFont("helvetica", "bold");
        const cargo = (db.perfil.cargo || "SUPERVISOR").toUpperCase();
        doc.text(`${cargo}:`, 5, y); y += 5; doc.setFont("helvetica", "normal"); doc.text(db.perfil.nome.toUpperCase(), 5, y);
        doc.save(`Card_${r.posto}.pdf`);
    }

    async function gerarRelatorioPlantao() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // Formato Paisagem (deitado) 
        
        if (!db.perfil.nome || db.rondas.length === 0) {
            alert("⚠️ Complete seu perfil primeiro.");
            return;
        }

        const margemEsq = 15;
        let y = 15;
        const rondasEfetivas = db.rondas.filter(r => !r.isIntervalo);

        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("RELATÓRIO DE PLANTÃO", 148.5, y, { align: "center" });
        
        y += 15;
        doc.setFontSize(11);
        doc.setFont("helvetica", "normal");
        doc.text(`DATA: ${new Date().toLocaleDateString('pt-BR')}`, margemEsq, y);
        y += 10;
        // Puxa Nome, Cargo e Matrícula do seu Perfil [cite: 18, 19]
        doc.text(`${db.perfil.nome.toUpperCase()}   ${db.perfil.cargo.toUpperCase()}   MAT: ${db.perfil.matricula || 'N/C'}`, margemEsq, y);

        y += 15;
        doc.setFontSize(9);
        const col = { n: 15, posto: 30, hora: 90, colab: 115, motivo: 165, vtr: 205, km: 235, valida: 260 };
        doc.text("N°", col.n, y);
        doc.text("POSTO", col.posto, y);
        doc.text("HORA", col.hora, y);
        doc.text("COLABORADOR", col.colab, y);
        doc.text("MOTIVO", col.motivo, y);
        doc.text("VTR", col.vtr, y);
        doc.text("KM", col.km, y);
        doc.text("VALIDAÇÃO", col.valida, y);

        y += 8;
        rondasEfetivas.forEach((r, index) => {
            if (y > 185) { doc.addPage(); y = 20; }
            doc.text(`${index + 1}.`, col.n, y);
            doc.text(r.posto.toUpperCase().substring(0, 30), col.posto, y);
            doc.text(r.hora, col.hora, y);
            doc.text(r.colaborador_posto.toUpperCase(), col.colab, y);
            doc.text(r.motivo.toUpperCase(), col.motivo, y);
            doc.text(db.perfil.placa || "—", col.vtr, y);
            doc.text(r.km.toString(), col.km, y);
            doc.text(r.foto ? "OK" : "N/A", col.valida, y);
            y += 8;
        });

        const rodapeY = 195;
        doc.setFont("helvetica", "bold");
        doc.text(db.perfil.empresa.toUpperCase() || "EMPRESA", 148.5, rodapeY - 6, { align: "center" });
        doc.text(`CNPJ: ${db.perfil.cnpj || "CNPJ"}`, 148.5, rodapeY, { align: "center" });

        doc.save(`Relatorio_Sentinela.pdf`);
    }

    function gerenciarIntervalo() {
        const agora = new Date();
        if (!db.intervaloAtivo) {
            db.intervaloAtivo = agora.getTime(); alert("☕ Intervalo Iniciado!");
        } else {
            const inicio = new Date(db.intervaloAtivo);
            const diffMin = Math.round((agora - inicio) / 60000);
            db.rondas.push({ id: Date.now(), isIntervalo: true, posto: "☕ INTERVALO", duracao: diffMin, hora: inicio.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            db.intervaloAtivo = null; alert("✅ Intervalo Finalizado!");
        }
        saveDB(); renderRondas(); atualizarBotaoIntervalo();
    }

    function atualizarBotaoIntervalo() {
        const btn = document.getElementById('btn-intervalo');
        if (db.intervaloAtivo) { btn.innerText = "🛑 FINALIZAR INTERVALO"; btn.style.background = '#f85149'; }
        else { btn.innerText = "☕ INICIAR INTERVALO / JANTA"; btn.style.background = '#2563eb'; }
    }

    function renderPostos() {
        const busca = document.getElementById('busca-posto').value.toLowerCase();
        const lista = document.getElementById('lista-postos');
        const filtrados = db.postos.filter(p => p.nome.toLowerCase().includes(busca));
        lista.innerHTML = filtrados.map((p, i) => `
            <div class="posto-item">
                <div><b>${p.nome}</b><br><small>${p.endereco || 'Sem endereço'}</small></div>
                <div style="display:flex; gap:5px;">
                    <button onclick="window.open('http://googleusercontent.com/maps.google.com/4{encodeURIComponent(p.endereco || p.nome)}')" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:0.7rem; cursor:pointer;">ROTA</button>
                    <button onclick="excluirPosto(${i})" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:4px; font-size:0.7rem; cursor:pointer;">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function adicionarPosto() {
        const n = prompt("Nome do posto:"); if(!n) return;
        const e = prompt("Endereço (Rua, Nº, Cidade):");
        db.postos.push({nome: n.toUpperCase(), endereco: e || ""}); saveDB(); renderPostos();
    }

    function excluirPosto(i) { if(confirm("Excluir posto?")) { db.postos.splice(i,1); saveDB(); renderPostos(); } }

    function renderRondas() {
        const log = document.getElementById('historico-rondas');
        log.innerHTML = db.rondas.slice().reverse().map(r => `
            <div class="ronda-entry" style="${r.isIntervalo ? 'border-left-color:#3b82f6;' : ''}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${r.hora}</strong> - ${r.posto} ${r.duracao ? '('+r.duracao+'min)' : ''}</div>
                    ${!r.isIntervalo ? `<button onclick="gerarCardIndividual(${r.id})" style="background:var(--accent); border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:0.7rem;">🖨️ CARD</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function salvarPerfil() {
        db.perfil = { nome: document.getElementById('p-nome').value, matricula: document.getElementById('p-matrícula').value, cargo: document.getElementById('p-cargo').value, placa: document.getElementById('p-placa').value.toUpperCase(), empresa: document.getElementById('p-empresa').value, cnpj: document.getElementById('p-cnpj').value };
        saveDB(); alert("✅ Perfil Atualizado!");
    }

    function previewImage(input) { if (input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => fotoBase64 = e.target.result; reader.readAsDataURL(input.files[0]); } }
    function toggleCheck(item) { item.classList.toggle('ok'); }
    function toggleFiscalizacao() { const m = document.getElementById('r-motivo').value; document.getElementById('sec-fiscalizacao').style.display = (m === 'Fiscalização') ? 'block' : 'none'; }
    function zerarPlantao() { if(confirm("Zerar tudo?")) { db.rondas = []; saveDB(); renderRondas(); } }

    window.onload = () => showView('home');
</script>
</body>
</html>
