<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINELA OPS - V2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #0a192f; --accent: #ffd600; --danger: #f85149;
            --success: #238636; --bg: #0f1c2e; --card: #16233a;
            --text: #e0e7ff; --text-light: #a3bffa;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 80px; line-height: 1.4; }
        .header { background: var(--primary); color: white; padding: 14px 16px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; font-weight: bold; }
        .header h1 { margin: 0; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .container { padding: 12px; max-width: 640px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #334155; border-radius: 8px; padding: 18px; margin-bottom: 16px; }
        .card h3 { margin: 0 0 16px 0; padding-bottom: 10px; border-bottom: 3px solid var(--accent); color: var(--accent); font-size: 0.98rem; text-transform: uppercase; font-weight: 700; }
        label { display: block; font-size: 0.76rem; font-weight: 600; color: #94a3b8; margin: 14px 0 5px 0; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 13px 14px; background: #1e2a44; border: 1px solid #475569; border-radius: 6px; color: white; font-size: 1rem; }
        .btn { width: 100%; padding: 16px; margin-top: 12px; border: none; border-radius: 6px; font-weight: 700; font-size: 0.96rem; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: var(--accent); color: #0a192f; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: #2563eb; color: white; }
        .btn-success { background: var(--success); color: white; }
        .posto-item { background: var(--card); border: 1px solid #334155; border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .ronda-entry { background: #1e2a44; padding: 13px; border-radius: 6px; margin-bottom: 9px; border-left: 5px solid var(--accent); font-size: 0.87rem; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); display: flex; border-top: 4px solid var(--accent); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 12px 6px; color: #94a3b8; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .hidden { display: none !important; }
        .checklist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 10px; }
        .check-item { background: #1e2a44; border: 2px solid #475569; padding: 13px 10px; border-radius: 6px; text-align: center; font-size: 0.79rem; cursor: pointer; }
        .check-item.ok { border-color: var(--success); color: var(--success); background: rgba(35, 134, 54, 0.2); }
    </style>
</head>
<body>

    <div class="header">
        <h1>SENTINELA OPS</h1>
        <span>🛡️</span>
    </div>

    <div id="view-home" class="container">
        <button class="btn btn-primary" onclick="showView('rondas')">📍 REGISTRO DE RONDAS</button>
        <button class="btn btn-info" onclick="showView('postos')">📋 BASE DE POSTOS / ROTAS</button>
        <button class="btn btn-success" onclick="gerarRelatorioPlantao()">📄 RELATÓRIO DE PLANTÃO (PDF)</button>
        <button class="btn btn-primary" style="background:#4b5563" onclick="showView('biblioteca')">📚 BIBLIOTECA MENSAL</button>
        <button class="btn btn-info" onclick="showView('perfil')">👤 MEU PERFIL</button>
    </div>

    <div id="view-rondas" class="container hidden">
        <div class="card">
            <h3>REGISTRO OPERACIONAL</h3>
            <button id="btn-intervalo" class="btn btn-info" onclick="gerenciarIntervalo()">☕ INICIAR INTERVALO</button>
            
            <label>Posto / Local</label>
            <select id="r-posto"></select>

            <label>Viatura / KM</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="r-placa" placeholder="Placa" readonly>
                <input type="number" id="r-km" placeholder="KM Atual">
            </div>

            <label>Colaborador no Local / Missão</label>
            <input type="text" id="r-func" placeholder="Nome do vigilante">
            <select id="r-motivo" onchange="toggleFiscalizacao()">
                <option value="Fiscalização">Fiscalização</option>
                <option value="Deslocamento">Deslocamento</option>
                <option value="Entrega de Material">Entrega de Material</option>
                <option value="Outros">Outros</option>
            </select>

            <div id="sec-checklist" style="margin-top:15px;">
                <label>CHECKLIST TÁTICO</label>
                <div class="checklist-grid" id="checklist">
                    <div class="check-item" onclick="toggleCheck(this)">APRESENTAÇÃO</div>
                    <div class="check-item" onclick="toggleCheck(this)">UNIFORME</div>
                    <div class="check-item" onclick="toggleCheck(this)">POSTURA</div>
                    <div class="check-item" onclick="toggleCheck(this)">LIVRO OCORRÊNCIA</div>
                    <div class="check-item" onclick="toggleCheck(this)">MATERIAL</div>
                    <div class="check-item" onclick="toggleCheck(this)">OUTROS</div>
                </div>
            </div>

            <label>Observações</label>
            <textarea id="r-obs" rows="3"></textarea>

            <label>Foto da Ocorrência</label>
            <input type="file" accept="image/*" capture="camera" onchange="previewImage(this)">

            <button class="btn btn-success" onclick="salvarRonda()">✅ FINALIZAR REGISTRO</button>
        </div>
        <div id="historico-rondas"></div>
    </div>

    <div id="view-biblioteca" class="container hidden">
        <div class="card">
            <h3>📚 BIBLIOTECA DE RELATÓRIOS</h3>
            <div id="lista-relatorios-salvos"></div>
            <hr style="border:0; border-top:1px solid #334155; margin: 20px 0;">
            <h3>⚙️ GESTÃO DE CICLO</h3>
            <button class="btn btn-danger" onclick="iniciarNovoCiclo()">🔄 FECHAR MÊS / NOVO CICLO</button>
        </div>
    </div>

    <div id="view-postos" class="container hidden">
        <div class="card">
            <h3>BASE DE POSTOS</h3>
            <button class="btn btn-primary" onclick="adicionarPosto()">➕ ADICIONAR NOVO POSTO</button>
            <input type="text" id="busca-posto" placeholder="Buscar posto..." onkeyup="renderPostos()" style="margin-top:10px;">
        </div>
        <div id="lista-postos"></div>
    </div>

    <div id="view-perfil" class="container hidden">
        <div class="card">
            <h3>MEU PERFIL OPERACIONAL</h3>
            <label>Nome Completo</label><input type="text" id="p-nome">
            <label>Matrícula</label><input type="text" id="p-matrícula">
            <label>Cargo</label><input type="text" id="p-cargo">
            <label>Viatura (Placa)</label><input type="text" id="p-placa">
            <label>Empresa</label><input type="text" id="p-empresa">
            <label>CNPJ</label><input type="text" id="p-cnpj">
            <button class="btn btn-success" onclick="salvarPerfil()">SALVAR DADOS</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" id="nav-home" onclick="showView('home')">🏠 HOME</div>
        <div class="nav-item" id="nav-rondas" onclick="showView('rondas')">📍 RONDAS</div>
        <div class="nav-item" id="nav-biblioteca" onclick="showView('biblioteca')">📚 ARQUIVO</div>
        <div class="nav-item" id="nav-perfil" onclick="showView('perfil')">👤 PERFIL</div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('sentinela_ops_db')) || { 
            perfil: {}, postos: [], rondas: [], biblioteca: [], intervaloAtivo: null 
        };
        let fotoBase64 = "";

        function saveDB() { localStorage.setItem('sentinela_ops_db', JSON.stringify(db)); }

        // --- LÓGICA DE DATA OPERACIONAL (SOLUÇÃO TURNO NOTURNO) ---
        function getDataOperacional() {
            const agora = new Date();
            const hora = agora.getHours();
            // Se for entre 00:00 e 06:59, retroage 1 dia para manter a data do início do plantão
            if (hora < 7) {
                agora.setDate(agora.getDate() - 1);
            }
            return {
                dataBr: agora.toLocaleDateString('pt-BR'),
                competencia: `${(agora.getMonth() + 1).toString().padStart(2, '0')}/${agora.getFullYear()}`
            };
        }

        function showView(view) {
            document.querySelectorAll('.container').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const nav = document.getElementById('nav-' + view); if(nav) nav.classList.add('active');
            
            if (view === 'rondas') {
                document.getElementById('r-placa').value = db.perfil.placa || "";
                const sel = document.getElementById('r-posto');
                sel.innerHTML = '<option value="">Selecione um posto...</option>';
                db.postos.forEach(p => sel.innerHTML += `<option value="${p.nome}">${p.nome}</option>`);
                renderRondas();
                atualizarBotaoIntervalo();
            }
            if (view === 'biblioteca') renderBiblioteca();
            if (view === 'perfil') carregarPerfil();
            if (view === 'postos') renderPostos();
        }

        function salvarRonda() {
            const infoData = getDataOperacional();
            const checklist = {};
            document.querySelectorAll('#checklist .check-item').forEach(item => {
                checklist[item.innerText] = item.classList.contains('ok') ? 'OK' : 'PEND';
            });

            const ronda = {
                id: Date.now(),
                posto: document.getElementById('r-posto').value || "SEM POSTO",
                motivo: document.getElementById('r-motivo').value,
                km: document.getElementById('r-km').value || '0',
                data: infoData.dataBr,
                competencia: infoData.competencia,
                hora: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
                colaborador_posto: document.getElementById('r-func').value || "N/A",
                obs: document.getElementById('r-obs').value || 'Sn.',
                checklist: checklist,
                foto: fotoBase64,
                isIntervalo: false
            };

            db.rondas.push(ronda); 
            saveDB(); 
            renderRondas();
            alert("Ronda Registrada!");
            limparFormRonda();
        }

        function limparFormRonda() {
            fotoBase64 = ""; 
            document.getElementById('r-km').value = ''; 
            document.getElementById('r-obs').value = ''; 
            document.getElementById('r-func').value = '';
            document.querySelectorAll('.check-item').forEach(i => i.classList.remove('ok'));
        }

        // --- GESTÃO DE BIBLIOTECA E CICLOS ---
        function iniciarNovoCiclo() {
            if (db.rondas.length === 0) return alert("Não há dados para arquivar.");
            if (confirm("Deseja encerrar este mês? Os dados atuais serão movidos para a biblioteca e a tela principal será limpa.")) {
                const info = getDataOperacional();
                db.biblioteca.push({
                    id: Date.now(),
                    mes: info.competencia,
                    dataArquivamento: new Date().toLocaleString('pt-BR'),
                    dados: [...db.rondas]
                });
                db.rondas = [];
                saveDB();
                renderBiblioteca();
                alert("Ciclo encerrado com sucesso!");
            }
        }

        function renderBiblioteca() {
            const lista = document.getElementById('lista-relatorios-salvos');
            if (!db.biblioteca || db.biblioteca.length === 0) {
                lista.innerHTML = '<p style="text-align:center; color:#94a3b8;">Nenhum arquivo encontrado.</p>';
                return;
            }
            lista.innerHTML = db.biblioteca.slice().reverse().map(rel => `
                <div class="posto-item">
                    <div>
                        <strong style="color:var(--accent)">MÊS: ${rel.mes}</strong><br>
                        <small>${rel.dados.length} registros</small>
                    </div>
                    <button class="btn btn-info" style="width:auto; margin:0; padding:8px 15px;" 
                        onclick="baixarRelatorioAntigo(${rel.id})">📥 BAIXAR</button>
                </div>
            `).join('');
        }

        async function baixarRelatorioAntigo(id) {
            const rel = db.biblioteca.find(b => b.id === id);
            if (rel) {
                const backupAtual = [...db.rondas];
                db.rondas = rel.dados;
                await gerarRelatorioPlantao();
                db.rondas = backupAtual;
            }
        }

        // --- RELATÓRIO PDF ---
        async function gerarRelatorioPlantao() {
            if (db.rondas.length === 0) return alert("Nada para gerar.");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            let y = 20;

            doc.setFontSize(16); doc.text("RELATÓRIO DE PLANTÃO MENSAL", 148, y, {align:'center'});
            y += 10;
            doc.setFontSize(10);
            doc.text(`RESPONSÁVEL: ${db.perfil.nome || '--'} | VTR: ${db.perfil.placa || '--'}`, 15, y);
            
            y += 10;
            const col = { data: 15, posto: 40, hora: 100, motivo: 120, colab: 170, obs: 210 };
            doc.setFont(undefined, 'bold');
            doc.text("DATA", col.data, y); doc.text("POSTO", col.posto, y); doc.text("HORA", col.hora, y);
            doc.text("MOTIVO", col.motivo, y); doc.text("COLABORADOR", col.colab, y); doc.text("OBSERVAÇÃO", col.obs, y);

            doc.setFont(undefined, 'normal');
            db.rondas.forEach(r => {
                y += 8;
                if (y > 180) { doc.addPage(); y = 20; }
                doc.text(r.data, col.data, y);
                doc.text(r.posto.substring(0, 25), col.posto, y);
                doc.text(r.hora, col.hora, y);
                doc.text(r.motivo, col.motivo, y);
                doc.text(r.colaborador_posto.substring(0, 15), col.colab, y);
                doc.text(r.obs.substring(0, 30), col.obs, y);
            });

            doc.save(`Relatorio_Sentinela_${Date.now()}.pdf`);
        }

        // --- FUNÇÕES AUXILIARES ---
        function gerenciarIntervalo() {
            const agora = new Date();
            if (!db.intervaloAtivo) {
                db.intervaloAtivo = agora.getTime(); alert("☕ Intervalo Iniciado!");
            } else {
                const inicio = new Date(db.intervaloAtivo);
                const diffMin = Math.round((agora - inicio) / 60000);
                const info = getDataOperacional();
                db.rondas.push({ 
                    id: Date.now(), isIntervalo: true, posto: "☕ INTERVALO", 
                    duracao: diffMin, data: info.dataBr, hora: inicio.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
                });
                db.intervaloAtivo = null; alert("✅ Intervalo Finalizado!");
            }
            saveDB(); renderRondas(); atualizarBotaoIntervalo();
        }

        function atualizarBotaoIntervalo() {
            const btn = document.getElementById('btn-intervalo');
            if (db.intervaloAtivo) { btn.innerText = "🛑 FINALIZAR INTERVALO"; btn.style.background = '#f85149'; }
            else { btn.innerText = "☕ INICIAR INTERVALO"; btn.style.background = '#2563eb'; }
        }

        function renderPostos() {
            const busca = document.getElementById('busca-posto').value.toLowerCase();
            const lista = document.getElementById('lista-postos');
            lista.innerHTML = db.postos.filter(p => p.nome.toLowerCase().includes(busca)).map((p, i) => `
                <div class="posto-item">
                    <span>${p.nome}</span>
                    <button class="btn btn-danger" style="width:auto; margin:0; padding:5px 10px;" onclick="excluirPosto(${i})">🗑️</button>
                </div>
            `).join('');
        }

        function adicionarPosto() {
            const n = prompt("Nome do posto:"); 
            if(n) { db.postos.push({nome: n.toUpperCase()}); saveDB(); renderPostos(); }
        }

        function excluirPosto(i) { if(confirm("Excluir?")) { db.postos.splice(i,1); saveDB(); renderPostos(); } }

        function renderRondas() {
            const log = document.getElementById('historico-rondas');
            log.innerHTML = db.rondas.slice().reverse().map(r => `
                <div class="ronda-entry">
                    <strong>${r.data} | ${r.hora}</strong> - ${r.posto}<br>
                    <small>${r.motivo} | Obs: ${r.obs}</small>
                </div>
            `).join('');
        }

        function carregarPerfil() {
            document.getElementById('p-nome').value = db.perfil.nome || "";
            document.getElementById('p-placa').value = db.perfil.placa || "";
            // ... carregar demais campos
        }

        function salvarPerfil() {
            db.perfil = { 
                nome: document.getElementById('p-nome').value, 
                placa: document.getElementById('p-placa').value.toUpperCase(),
                empresa: document.getElementById('p-empresa').value,
                cnpj: document.getElementById('p-cnpj').value,
                cargo: document.getElementById('p-cargo').value,
                matricula: document.getElementById('p-matrícula').value
            };
            saveDB(); alert("Perfil Salvo!");
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => fotoBase64 = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toggleCheck(item) { item.classList.toggle('ok'); }
        function toggleFiscalizacao() {}

        window.onload = () => showView('home');
    </script>
</body>
</html>
