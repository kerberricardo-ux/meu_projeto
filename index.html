<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FortGuard - Ronda Fácil</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0d1117; color:#fff; }
.container { padding:10px; }
.card { background:#161b22; padding:10px; margin-bottom:10px; border-radius:5px; }
.btn { padding:10px; width:100%; margin-top:5px; border:none; cursor:pointer; }
.btn-pdf { background:#1f6feb; color:#fff; }
.btn-save { background:#238636; color:#fff; }
.editable-field { background:#000; padding:5px; margin:5px 0; }
</style>
</head>

<body>

<div class="container">
    <div id="lista-postos"></div>
</div>

<script>
const postosIniciais = ["10º TABELIONATO","COLÉGIO DOM FELICIANO"];

let db = {
    postos: postosIniciais.map(n => ({nome:n, endereco:"", telefone:""}))
};

// ✅ FUNÇÃO CORRIGIDA
function renderPostos() {
    const lista = document.getElementById('lista-postos');
    lista.innerHTML = "";

    db.postos.forEach((p, index) => {

        const queryMaps = encodeURIComponent(p.nome + " " + p.endereco);

        // 🔥 CORREÇÃO AQUI (geo:)
        const linkRota = `geo:0,0?q=${queryMaps}`;

        lista.innerHTML += `
            <div class="card">
                <strong>${p.nome}</strong>

                <div class="editable-field" contenteditable="true"
                onblur="db.postos[${index}].endereco=this.innerText">
                ${p.endereco || 'Editar endereço'}
                </div>

                <div class="editable-field" contenteditable="true"
                onblur="db.postos[${index}].telefone=this.innerText">
                ${p.telefone || 'Editar telefone'}
                </div>

                <button class="btn btn-pdf"
                onclick="window.location.href='${linkRota}'">
                ROTA
                </button>

                <button class="btn btn-save"
                onclick="window.location.href='tel:${p.telefone}'">
                LIGAR
                </button>
            </div>
        `;
    });
}

renderPostos();
</script>

</body>
</html>
